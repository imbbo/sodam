<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>당근으로 이동중...</title>
  <style>
    body {
      margin: 0;
      background: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .wrap {
      padding: 20px;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }
    p {
      color: #555;
      margin-bottom: 20px;
    }
    a {
      display: inline-block;
      padding: 14px 18px;
      border-radius: 12px;
      background: #ff6f0f;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>당근으로 이동중...</h1>
    <p>앱 실행을 시도하고 있어요.<br>안되면 버튼 눌러주세요.</p>
    <a href="https://www.daangn.com/kr/local-profile/qoqsbvmt1nux/">
      당근 웹으로 열기
    </a>
  </div>

  <script>
    const webUrl = "https://www.daangn.com/kr/local-profile/qoqsbvmt1nux/";
    const customScheme = "daangn://";
    const androidIntent =
      "intent://www.daangn.com/kr/local-profile/qoqsbvmt1nux/#Intent;scheme=https;package=com.towneers.www;S.browser_fallback_url=" +
      encodeURIComponent(webUrl) +
      ";end";

    function isAndroid() {
      return /Android/i.test(navigator.userAgent);
    }

    function isIOS() {
      return /iPhone|iPad|iPod/i.test(navigator.userAgent);
    }

    function openApp() {
      if (isAndroid()) {
        location.href = androidIntent;
        setTimeout(() => location.href = webUrl, 1500);
      } else if (isIOS()) {
        location.href = customScheme;
        setTimeout(() => location.href = webUrl, 1500);
      } else {
        location.href = webUrl;
      }
    }

    window.onload = openApp;
  </script>
</body>
</html>
