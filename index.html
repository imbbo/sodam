<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>당근으로 이동중...</title>
  <meta name="robots" content="noindex,nofollow" />

  <style>
    body {
      margin: 0;
      background: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .wrap {
      padding: 24px;
      max-width: 420px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
    }
    p {
      color: #666;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      padding: 14px 18px;
      border-radius: 12px;
      background: #ff6f0f;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>당근으로 이동중...</h1>
    <p>
      앱으로 이동을 시도하고 있어요.<br>
      안되면 아래 버튼 눌러주세요.
    </p>

    <a href="https://karrot.app/kr/local-profile/qoqsbvmt1nux/">
      웹으로 열기
    </a>
  </div>

  <script>
    const webUrl = "https://karrot.app/kr/local-profile/qoqsbvmt1nux/";
    const appScheme = "daangn://";

    const androidIntent =
      "intent://karrot.app/kr/local-profile/qoqsbvmt1nux/#Intent;scheme=https;package=com.towneers.www;S.browser_fallback_url=" +
      encodeURIComponent(webUrl) +
      ";end";

    function isAndroid() {
      return /Android/i.test(navigator.userAgent);
    }

    function isIOS() {
      return /iPhone|iPad|iPod/i.test(navigator.userAgent);
    }

    function openApp() {
      if (isAndroid()) {
        // 안드: intent로 앱 실행 시도
        window.location.href = androidIntent;

        // 실패하면 웹 이동
        setTimeout(() => {
          window.location.href = webUrl;
        }, 1500);

        return;
      }

      if (isIOS()) {
        // iOS: 스킴으로 앱 실행 시도
        window.location.href = appScheme;

        // 실패하면 웹 이동
        setTimeout(() => {
          window.location.href = webUrl;
        }, 1500);

        return;
      }

      // PC 등
      window.location.href = webUrl;
    }

    // 페이지 열리자마자 실행
    window.onload = openApp;
  </script>
</body>
</html>
